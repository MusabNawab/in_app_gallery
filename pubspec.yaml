name: in_app_gallery
description: "A highly customizable Flutter package for selecting images and videos from the device gallery, featuring a polished UI and media compression."
version: 1.0.1
homepage: https://github.com/MusabNawab/in_app_gallery
repository: https://github.com/MusabNawab/in_app_gallery

topics:
  - gallery
  - image-picker
  - video-picker
  - media-picker
  - compression

environment:
  sdk: ^3.12.0
  flutter: '>=3.3.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_bloc: ^9.1.1
  path_provider: ^2.1.5
  flutter_image_compress: ^2.4.0
  photo_manager: ^3.9.0
  device_info_plus: ^13.1.0
  uuid: ^4.5.3
  media_kit: ^1.2.6
  media_kit_video: ^2.0.1
  media_kit_libs_video: ^1.0.7
  image_picker: ^1.2.2
  fluttertoast: ^9.1.0 
  permission_handler: ^12.0.1
  skeletonizer: ^2.1.3 
  hw_video_compress: ^1.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

# For information on the generic Dart part of this file, see the
# following page: https://dart.dev/tools/pub/pubspec

# The following section is specific to Flutter packages.
flutter:

  # To add assets to your plugin package, add an assets section, like this:
  # assets:
  #   - images/a_dot_burr.jpeg
  #   - images/a_dot_ham.jpeg
  #
  # For details regarding assets in packages, see
  # https://flutter.dev/to/asset-from-package
  #
  # An image asset can refer to one or more resolution-specific "variants", see
  # https://flutter.dev/to/resolution-aware-images

  # To add custom fonts to your plugin package, add a fonts section here,
  # in this "flutter" section. Each entry in this list should have a
  # "family" key with the font family name, and a "fonts" key with a
  # list giving the asset and other descriptors for the font. For
